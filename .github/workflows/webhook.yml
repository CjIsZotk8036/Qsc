name: Launch Scanner Node (GitHub Hosted Template)

on:
  workflow_dispatch:
    inputs:
      scanner_url:
        description: "HTTPS URL to scanner binary"
        required: true
        type: string
      scanner_sha256:
        description: "Optional SHA256 checksum for scanner binary"
        required: false
        default: ""
        type: string
      server_url:
        description: "Scanner server URL, e.g. http://your-server:19988"
        required: true
        type: string
      node_secret:
        description: "Node auth secret (can be plain or from Actions secret)"
        required: true
        type: string
      node_name:
        description: "Node display name (leave empty = auto generate, e.g. US-6568-1234)"
        required: false
        default: ""
        type: string
      node_region:
        description: "Node region"
        required: false
        default: ""
        type: string
      node_uuid:
        description: "Node UUID (empty = auto-generate by client)"
        required: false
        default: ""
        type: string
      node_tags:
        description: "Comma-separated tags"
        required: false
        default: "github,ci"
        type: string
      auto_name_github_ci:
        description: "Enable US- auto naming for github,ci tags"
        required: false
        default: "true"
        type: string
      launch_token:
        description: "Launch token injected by webhook/webui"
        required: false
        default: ""
        type: string
      webhook:
        description: "Webhook metadata (optional passthrough)"
        required: false
        default: ""
        type: string
      run_mode:
        description: "foreground keeps job alive; detached starts background process then exits"
        required: true
        default: "foreground"
        type: choice
        options:
          - foreground
          - detached

jobs:
  launch-node:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          url="${{ inputs.scanner_url }}"
          if [[ ! "$url" =~ ^https:// ]]; then
            echo "scanner_url must be https://" >&2
            exit 1
          fi

      - name: Download scanner client
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .runtime
          curl --fail --show-error --silent --location --proto '=https' --tlsv1.2 \
            "${{ inputs.scanner_url }}" -o .runtime/scanner
          chmod +x .runtime/scanner
          sudo apt update -y && sudo apt install masscan -y

      - name: Verify checksum (optional)
        if: ${{ inputs.scanner_sha256 != '' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "${{ inputs.scanner_sha256 }}  .runtime/scanner" | sha256sum -c -

      - name: Resolve node name
        id: resolve_node_name
        shell: bash
        env:
          INPUT_NODE_NAME: ${{ inputs.node_name }}
          INPUT_NODE_TAGS: ${{ inputs.node_tags }}
          INPUT_AUTO_NAME_GITHUB_CI: ${{ inputs.auto_name_github_ci }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          node_name="$(printf '%s' "$INPUT_NODE_NAME" | xargs)"
          auto_flag="$(printf '%s' "$INPUT_AUTO_NAME_GITHUB_CI" | tr '[:upper:]' '[:lower:]' | xargs)"
          tags_csv="$(printf '%s' "$INPUT_NODE_TAGS" | tr '[:upper:]' '[:lower:]' | tr -d '[:space:]')"
          tags_norm=",${tags_csv},"
          should_auto_name=false
          if [[ "$auto_flag" == "true" || "$auto_flag" == "1" || "$auto_flag" == "yes" || "$auto_flag" == "on" ]]; then
            if [[ "$tags_norm" == *",github,"* && "$tags_norm" == *",ci,"* ]]; then
              should_auto_name=true
            fi
          fi

          if [[ -z "$node_name" && "$should_auto_name" == "true" ]]; then
            public_ip="$(curl --silent --max-time 3 https://api.ipify.org || true)"
            local_ip="$(hostname -I 2>/dev/null | tr ' ' '\n' | grep -E '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' | head -n 1 || true)"
            ip_candidate="$public_ip"
            if [[ -z "$ip_candidate" ]]; then
              ip_candidate="$local_ip"
            fi

            ip_hint="NA"
            if [[ "$ip_candidate" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              IFS='.' read -r _ _ c d <<< "$ip_candidate"
              ip_hint="${c}${d}"
            elif [[ -n "$ip_candidate" ]]; then
              compact_ip="$(printf '%s' "$ip_candidate" | tr -cd '[:alnum:]')"
              if [[ ${#compact_ip} -gt 6 ]]; then
                ip_hint="${compact_ip: -6}"
              elif [[ -n "$compact_ip" ]]; then
                ip_hint="$compact_ip"
              fi
            fi

            run_hint="${GITHUB_RUN_ID:-0}"
            if [[ ${#run_hint} -gt 4 ]]; then
              run_hint="${run_hint: -4}"
            fi
            node_name="US-${ip_hint}-${run_hint}"
          fi
          echo "node_name=$node_name" >> "$GITHUB_OUTPUT"

      - name: Start scanner node (foreground)
        if: ${{ inputs.run_mode == 'foreground' }}
        shell: bash
        env:
          SCAN_SERVER: ${{ inputs.server_url }}
          SCAN_SECRET: ${{ inputs.node_secret }}
          SCAN_NODE_NAME: ${{ steps.resolve_node_name.outputs.node_name }}
          SCAN_NODE_REGION: ${{ inputs.node_region }}
          SCAN_NODE_UUID: ${{ inputs.node_uuid }}
          SCAN_NODE_TAGS: ${{ inputs.node_tags }}
          SCAN_LAUNCH_TOKEN: ${{ inputs.launch_token }}
          WEBHOOK_CONTEXT: ${{ inputs.webhook }}
        run: |
          set -euo pipefail
          args=(node "$SCAN_SERVER" "$SCAN_SECRET" --name "$SCAN_NODE_NAME" --tags "$SCAN_NODE_TAGS")
          if [[ -n "$SCAN_NODE_REGION" ]]; then
            args+=(--region "$SCAN_NODE_REGION")
          fi
          if [[ -n "$SCAN_NODE_UUID" ]]; then
            args+=(--uuid "$SCAN_NODE_UUID")
          fi
          if [[ -n "$SCAN_LAUNCH_TOKEN" ]]; then
            args+=(--launch-token "$SCAN_LAUNCH_TOKEN")
          fi
          sudo ./.runtime/scanner "${args[@]}"

      - name: Start scanner node (detached fallback)
        if: ${{ inputs.run_mode == 'detached' }}
        shell: bash
        env:
          SCAN_SERVER: ${{ inputs.server_url }}
          SCAN_SECRET: ${{ inputs.node_secret }}
          SCAN_NODE_NAME: ${{ steps.resolve_node_name.outputs.node_name }}
          SCAN_NODE_REGION: ${{ inputs.node_region }}
          SCAN_NODE_UUID: ${{ inputs.node_uuid }}
          SCAN_NODE_TAGS: ${{ inputs.node_tags }}
          SCAN_LAUNCH_TOKEN: ${{ inputs.launch_token }}
          WEBHOOK_CONTEXT: ${{ inputs.webhook }}
        run: |
          set -euo pipefail
          echo "detached mode is not persistent on github-hosted runners, fallback to foreground execution"
          args=(node "$SCAN_SERVER" "$SCAN_SECRET" --name "$SCAN_NODE_NAME" --tags "$SCAN_NODE_TAGS")
          if [[ -n "$SCAN_NODE_REGION" ]]; then
            args+=(--region "$SCAN_NODE_REGION")
          fi
          if [[ -n "$SCAN_NODE_UUID" ]]; then
            args+=(--uuid "$SCAN_NODE_UUID")
          fi
          if [[ -n "$SCAN_LAUNCH_TOKEN" ]]; then
            args+=(--launch-token "$SCAN_LAUNCH_TOKEN")
          fi
          sudo ./.runtime/scanner "${args[@]}"
